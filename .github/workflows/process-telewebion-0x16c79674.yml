name: Inspect Telegram widget frame API

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Fetch widget frame source
        shell: bash
        run: |
          mkdir -p run-reports/widget
          curl -L --compressed -sS \
            -e 'https://t.me/ostad_mirbaqeri/2102?embed=1&mode=tme' \
            'https://telegram.org/js/widget-frame.js?67' \
            -o run-reports/widget/widget-frame.js
          curl -L --compressed -sS \
            'https://t.me/ostad_mirbaqeri/2102?embed=1&mode=tme' \
            -o run-reports/widget/post.html

      - name: Extract API call logic
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          report = {}
          for path in sorted(Path('run-reports/widget').glob('*')):
              text = path.read_text(encoding='utf-8', errors='replace')
              contexts = {}
              for word in (
                  'TWidgetPost', 'TWidgetAuth', 'api_url', 'upload_url',
                  'apiCall', 'download', 'document', 'getFile', 'getMessage',
                  'peer_hash', 'peer-hash', 'post-id', 'inputDocument', 'upload.getFile'
              ):
                  positions = [m.start() for m in re.finditer(re.escape(word), text, flags=re.I)]
                  contexts[word] = [
                      text[max(0, pos - 1000):pos + 3000]
                      for pos in positions[:30]
                  ]
              report[str(path)] = {
                  'bytes': len(text.encode('utf-8')),
                  'contexts': contexts,
              }
          Path('run-reports/widget/results.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload widget frame inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-widget-frame
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
