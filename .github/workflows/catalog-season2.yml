name: Catalog Asre Shirin Season 2

on:
  push:
    branches: [main]
    paths:
      - scripts/catalog_asre_shirin.py
      - .github/workflows/catalog-season2.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: catalog-asre-shirin-season-2
  cancel-in-progress: false

jobs:
  catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build catalog from official site
        id: catalog
        shell: bash
        run: |
          set +e
          PYTHONPATH=src python scripts/catalog_asre_shirin.py \
            --output data/asre-shirin-season-2-catalog.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit catalog result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/asre-shirin-season-2-catalog.json
          if git diff --cached --quiet; then
            echo "Catalog is unchanged"
          else
            git commit -m "Catalog Asre Shirin season 2"
            git push origin HEAD:main
          fi

      - name: Upload catalog diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: asre-shirin-season-2-catalog
          path: data/asre-shirin-season-2-catalog.json
          retention-days: 7

      - name: Enforce ready catalog
        if: steps.catalog.outputs.exit_code != '0'
        run: |
          echo "Catalog needs investigation; committed diagnostics for repair."
          exit 1
