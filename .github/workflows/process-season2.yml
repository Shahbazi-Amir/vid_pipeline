name: Process Asre Shirin Season 2

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  announce:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/run-season2-processing'
    runs-on: ubuntu-latest
    steps:
      - name: Report PR start
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Season-two processing started — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

  prepare:
    needs: announce
    runs-on: ubuntu-latest
    outputs:
      episodes: ${{ steps.catalog.outputs.episodes }}
      count: ${{ steps.catalog.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Normalize published catalog
        id: catalog
        shell: bash
        run: |
          mkdir -p normalized
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          source = Path("data/asre-shirin-season-2-catalog.json")
          data = json.loads(source.read_text(encoding="utf-8"))
          entries = data.get("season_two") or []
          if not entries:
              raise SystemExit("Catalog contains no published season-two episodes")
          if len(entries) > 13:
              raise SystemExit(f"Catalog has too many season-two entries: {len(entries)}")
          for index, entry in enumerate(entries, 1):
              entry["season_episode"] = index
              entry["overall_episode"] = index + 13
          data["status"] = "ready"
          data["published_episode_count"] = len(entries)
          Path("normalized/catalog.json").write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          matrix = list(range(1, len(entries) + 1))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"episodes={json.dumps(matrix)}\n")
              output.write(f"count={len(entries)}\n")
          print(f"Published season-two episodes: {matrix}")
          PY

      - name: Upload normalized catalog
        uses: actions/upload-artifact@v4
        with:
          name: normalized-season2-catalog
          path: normalized/catalog.json
          retention-days: 7

  process:
    needs: [announce, prepare]
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        season_episode: ${{ fromJSON(needs.prepare.outputs.episodes) }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Download normalized catalog
        uses: actions/download-artifact@v4
        with:
          name: normalized-season2-catalog
          path: normalized

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install pipeline
        run: pip install -e '.[all]'

      - name: Process episode
        id: process
        shell: bash
        run: |
          set +e
          python scripts/process_season2_episode.py \
            --catalog normalized/catalog.json \
            --season-episode "${{ matrix.season_episode }}" \
            --work-root work \
            --output-root stage/season2 \
            --model small \
            --device cpu \
            --compute-type int8
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload text and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: season2-text-${{ matrix.season_episode }}
          path: |
            stage/season2/episode-*/
            !stage/season2/episode-*/*.mp3
          if-no-files-found: warn
          retention-days: 30

      - name: Upload review audio
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: season2-audio-${{ matrix.season_episode }}
          path: stage/season2/episode-*/*.review.mp3
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce episode success
        if: steps.process.outputs.exit_code != '0'
        run: exit 1

  collect:
    needs: [announce, prepare, process]
    if: always() && needs.announce.result == 'success' && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download text artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: season2-text-*
          path: collected
          merge-multiple: true

      - name: Commit each episode independently
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin agent/season2-processing || true
          if git show-ref --verify --quiet refs/remotes/origin/agent/season2-processing; then
            git switch -C agent/season2-processing origin/agent/season2-processing
          else
            git switch -c agent/season2-processing origin/main
          fi
          mkdir -p processing/asre-shirin-season-2
          for source in collected/episode-*; do
            [ -d "$source" ] || continue
            name=$(basename "$source")
            destination="processing/asre-shirin-season-2/$name"
            rm -rf "$destination"
            cp -R "$source" "$destination"
            git add "$destination"
            if git diff --cached --quiet; then
              continue
            fi
            number=${name#episode-}
            git commit -m "Process Asre Shirin season 2 episode $number"
            git push origin HEAD:agent/season2-processing
          done

      - name: Report PR completion
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          MATRIX_RESULT: ${{ needs.process.result }}
          PUBLISHED_COUNT: ${{ needs.prepare.outputs.count }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Season-two processing finished — published episodes: **$PUBLISHED_COUNT** — matrix: **$MATRIX_RESULT** — outputs: \`agent/season2-processing\` — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
