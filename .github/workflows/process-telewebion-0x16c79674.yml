name: Resolve target episode from Castbox RSS

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download RSS feed
        shell: bash
        run: |
          mkdir -p run-reports/rss
          urls=(
            'https://rss.castbox.fm/everest/adcedba9754d417d9ab80222f4dc2837.xml'
            'http://rss.castbox.fm/everest/adcedba9754d417d9ab80222f4dc2837.xml'
          )
          index=0
          for url in "${urls[@]}"; do
            index=$((index + 1))
            printf '%s\n' "$url" > "run-reports/rss/${index}-url.txt"
            curl -L --compressed -sS --max-time 180 \
              -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36' \
              -D "run-reports/rss/${index}-headers.txt" \
              "$url" -o "run-reports/rss/${index}.xml" || true
          done

      - name: Parse episodes and media URLs
        shell: bash
        run: |
          python - <<'PY'
          import html
          import json
          import re
          import xml.etree.ElementTree as ET
          from pathlib import Path

          terms = (
              'قصاص', 'انتقام', 'روایت فتح', 'میرباقری',
              'برنامه 167', 'برنامه ۱۶۷', 'به وقت ایران'
          )
          reports = []
          matches = []
          for path in sorted(Path('run-reports/rss').glob('*.xml')):
              raw = path.read_text(encoding='utf-8', errors='replace')
              entry = {'file': str(path), 'bytes': len(raw.encode('utf-8')), 'parse_error': '', 'items': []}
              try:
                  root = ET.fromstring(raw)
              except Exception as exc:
                  entry['parse_error'] = str(exc)
                  reports.append(entry)
                  continue
              for index, item in enumerate(root.findall('.//item')):
                  def value(name):
                      node = item.find(name)
                      return html.unescape((node.text or '').strip()) if node is not None else ''
                  title = value('title')
                  description = value('description')
                  pub_date = value('pubDate')
                  guid = value('guid')
                  enclosure = item.find('enclosure')
                  media_url = enclosure.attrib.get('url', '') if enclosure is not None else ''
                  media_length = enclosure.attrib.get('length', '') if enclosure is not None else ''
                  media_type = enclosure.attrib.get('type', '') if enclosure is not None else ''
                  duration = ''
                  for child in item:
                      if child.tag.endswith('duration'):
                          duration = (child.text or '').strip()
                          break
                  combined = f'{title}\n{description}'
                  row = {
                      'index': index,
                      'title': title,
                      'description': re.sub(r'<[^>]+>', ' ', description),
                      'pub_date': pub_date,
                      'guid': guid,
                      'enclosure_url': media_url,
                      'enclosure_length': media_length,
                      'enclosure_type': media_type,
                      'duration': duration,
                      'matched_terms': [term for term in terms if term in combined],
                  }
                  entry['items'].append(row)
                  if row['matched_terms']:
                      matches.append(row)
              reports.append(entry)
          Path('run-reports/rss/report.json').write_text(
              json.dumps(reports, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          Path('run-reports/rss/matches.json').write_text(
              json.dumps(matches, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          latest = []
          for report in reports:
              latest.extend(report['items'][:80])
          Path('run-reports/rss/latest.json').write_text(
              json.dumps(latest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(matches, ensure_ascii=False, indent=2))
          if not any(row.get('enclosure_url') for row in matches):
              raise SystemExit('Target episode with a media enclosure was not found in the RSS feed')
          PY

      - name: Upload RSS resolution
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-rss
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
