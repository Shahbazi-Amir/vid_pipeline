name: Capture public Telegram audio

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Load post, click player and capture network
        shell: bash
        run: |
          mkdir -p run-reports/playwright
          cat > run-reports/playwright/capture.py <<'PY'
          from __future__ import annotations

          import asyncio
          import json
          from pathlib import Path
          from urllib.parse import urlparse

          from playwright.async_api import async_playwright

          OUTPUT = Path('run-reports/playwright')
          TARGETS = [
              'https://t.me/bevaqteiran/1446?embed=1&mode=tme',
              'https://t.me/ostad_mirbaqeri/2102?embed=1&mode=tme',
          ]

          async def inspect(browser, url: str, index: int) -> dict:
              context = await browser.new_context(
                  accept_downloads=True,
                  locale='fa-IR',
                  user_agent=(
                      'Mozilla/5.0 (X11; Linux x86_64) '
                      'AppleWebKit/537.36 (KHTML, like Gecko) '
                      'Chrome/126.0.0.0 Safari/537.36'
                  ),
              )
              page = await context.new_page()
              requests: list[dict] = []
              responses: list[dict] = []
              downloads: list[dict] = []

              def on_request(request):
                  requests.append({
                      'url': request.url,
                      'method': request.method,
                      'resource_type': request.resource_type,
                      'headers': request.headers,
                  })

              async def on_response(response):
                  try:
                      headers = await response.all_headers()
                  except Exception:
                      headers = {}
                  content_type = headers.get('content-type', '')
                  content_length = headers.get('content-length', '')
                  if (
                      any(token in content_type.lower() for token in ('audio', 'video', 'octet-stream'))
                      or any(token in response.url.lower() for token in (
                          '.mp3', '.m4a', '.ogg', '.wav', '.mp4', '.m3u8',
                          'document', 'audio', 'download', 'cdn', 'telesco.pe'
                      ))
                  ):
                      responses.append({
                          'url': response.url,
                          'status': response.status,
                          'content_type': content_type,
                          'content_length': content_length,
                          'headers': headers,
                      })

              async def on_download(download):
                  suggested = download.suggested_filename
                  target = OUTPUT / f'{index}-download-{suggested}'
                  try:
                      await download.save_as(target)
                      downloads.append({
                          'url': download.url,
                          'suggested_filename': suggested,
                          'saved_path': str(target),
                          'size': target.stat().st_size,
                      })
                  except Exception as exc:
                      downloads.append({
                          'url': download.url,
                          'suggested_filename': suggested,
                          'error': str(exc),
                      })

              page.on('request', on_request)
              page.on('response', on_response)
              page.on('download', on_download)

              result = {'url': url, 'errors': [], 'clicks': [], 'requests': requests, 'responses': responses, 'downloads': downloads}
              try:
                  await page.goto(url, wait_until='networkidle', timeout=120_000)
              except Exception as exc:
                  result['errors'].append(f'goto: {exc}')
              await page.screenshot(path=OUTPUT / f'{index}-before.png', full_page=True)
              (OUTPUT / f'{index}-content.html').write_text(await page.content(), encoding='utf-8')

              selectors = [
                  '.tgme_widget_message_document_wrap',
                  '.tgme_widget_message_audio',
                  '.tgme_widget_message_document',
                  'audio',
                  'button',
                  '[role="button"]',
                  'a',
              ]
              for selector in selectors:
                  try:
                      locator = page.locator(selector)
                      count = min(await locator.count(), 30)
                      for item_index in range(count):
                          item = locator.nth(item_index)
                          try:
                              visible = await item.is_visible()
                              text = (await item.inner_text(timeout=2_000)).strip()[:300]
                              attrs = await item.evaluate(
                                  "el => ({class: el.className || '', href: el.href || '', "
                                  "src: el.src || '', title: el.title || '', "
                                  "aria: el.getAttribute('aria-label') || ''})"
                              )
                              record = {'selector': selector, 'index': item_index, 'visible': visible, 'text': text, 'attrs': attrs}
                              if visible and (
                                  selector in {'.tgme_widget_message_document_wrap', '.tgme_widget_message_audio', '.tgme_widget_message_document', 'audio'}
                                  or any(token in f"{text} {attrs}".lower() for token in ('audio', 'play', 'پخش', 'گفتگو', 'قصاص', 'document'))
                              ):
                                  try:
                                      await item.click(timeout=5_000, force=True)
                                      record['clicked'] = True
                                      await page.wait_for_timeout(8_000)
                                  except Exception as exc:
                                      record['click_error'] = str(exc)
                              result['clicks'].append(record)
                          except Exception as exc:
                              result['clicks'].append({'selector': selector, 'index': item_index, 'error': str(exc)})
                  except Exception as exc:
                      result['errors'].append(f'{selector}: {exc}')

              await page.wait_for_timeout(20_000)
              await page.screenshot(path=OUTPUT / f'{index}-after.png', full_page=True)
              result['final_url'] = page.url
              result['local_storage'] = await page.evaluate('Object.fromEntries(Object.entries(localStorage))')
              result['session_storage'] = await page.evaluate('Object.fromEntries(Object.entries(sessionStorage))')
              await context.close()
              return result

          async def main() -> None:
              async with async_playwright() as playwright:
                  browser = await playwright.chromium.launch(
                      headless=True,
                      args=['--autoplay-policy=no-user-gesture-required'],
                  )
                  results = []
                  for index, url in enumerate(TARGETS, start=1):
                      results.append(await inspect(browser, url, index))
                  await browser.close()
              (OUTPUT / 'results.json').write_text(
                  json.dumps(results, ensure_ascii=False, indent=2) + '\n',
                  encoding='utf-8',
              )
              candidates = []
              for result in results:
                  candidates.extend(result['responses'])
                  candidates.extend(result['downloads'])
              (OUTPUT / 'candidates.json').write_text(
                  json.dumps(candidates, ensure_ascii=False, indent=2) + '\n',
                  encoding='utf-8',
              )
              print(json.dumps(candidates, ensure_ascii=False, indent=2))
              if not candidates:
                  raise SystemExit('No media candidate was observed')

          asyncio.run(main())
          PY
          python run-reports/playwright/capture.py

      - name: Upload browser capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-playwright
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
