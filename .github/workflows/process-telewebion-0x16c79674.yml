name: Resolve Eitaa audio download

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Fetch post variants and client scripts
        shell: bash
        run: |
          mkdir -p run-reports/eitaa-resolve
          urls=(
            'https://eitaa.com/mirbaqeri_ir/8029'
            'https://eitaa.com/s/mirbaqeri_ir/8029'
            'https://eitaa.com/mirbaqeri_ir/8029?embed=1'
            'https://eitaa.com/mirbaqeri_ir/8029?embed=1&mode=etme'
            'https://eitaa.com/mirbaqeri_ir/8029?single'
          )
          index=0
          for url in "${urls[@]}"; do
            index=$((index + 1))
            printf '%s\n' "$url" > "run-reports/eitaa-resolve/${index}-url.txt"
            curl -L --compressed -sS --max-time 120 \
              -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36' \
              -D "run-reports/eitaa-resolve/${index}-headers.txt" \
              "$url" -o "run-reports/eitaa-resolve/${index}.html" || true
          done
          curl -L --compressed -sS 'https://eitaa.com/js/eitaa-web.js' \
            -o run-reports/eitaa-resolve/eitaa-web.js
          curl -L --compressed -sS 'https://eitaa.com/js/widget-frame.js' \
            -o run-reports/eitaa-resolve/widget-frame.js

      - name: Extract download and API clues
        shell: bash
        run: |
          python - <<'PY'
          import html
          import json
          import re
          from pathlib import Path

          report = {}
          for path in sorted(Path('run-reports/eitaa-resolve').glob('*')):
              if path.suffix not in {'.html', '.js'}:
                  continue
              text = html.unescape(path.read_text(encoding='utf-8', errors='replace'))
              urls = sorted(set(re.findall(r'(?:https?:)?//[^"\'<> )]+|/download_[^"\'<> )]+', text)))
              contexts = {}
              for term in (
                  'document_wrap', 'document_title', 'download_', 'audio', 'getFile',
                  'file_id', 'document_id', 'ajax', 'fetch(', 'XMLHttpRequest', 'data-post'
              ):
                  contexts[term] = [
                      text[max(0, m.start() - 600):m.start() + 1800]
                      for m in list(re.finditer(re.escape(term), text, flags=re.I))[:30]
                  ]
              report[str(path)] = {
                  'bytes': len(text.encode('utf-8')),
                  'urls': urls,
                  'contexts': contexts,
              }
          Path('run-reports/eitaa-resolve/results.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload resolution package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-eitaa-resolve
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
