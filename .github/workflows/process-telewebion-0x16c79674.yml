name: Probe Eitaa document download endpoints

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Probe candidate document endpoints
        shell: bash
        run: |
          set -u
          mkdir -p run-reports/eitaa-endpoints
          base='https://eitaa.com'
          candidates=(
            '/mirbaqeri_ir/8029'
            '/mirbaqeri_ir/8029?download=1'
            '/mirbaqeri_ir/8029?download=true'
            '/mirbaqeri_ir/8029?dl=1'
            '/mirbaqeri_ir/8029?file=1'
            '/mirbaqeri_ir/8029?single=1&download=1'
            '/mirbaqeri_ir/8029?embed=1&download=1'
            '/s/mirbaqeri_ir/8029?download=1'
            '/download/mirbaqeri_ir/8029'
            '/download/mirbaqeri_ir/8029.mp3'
            '/file/mirbaqeri_ir/8029'
            '/file/mirbaqeri_ir/8029.mp3'
            '/media/mirbaqeri_ir/8029'
            '/api/message/mirbaqeri_ir/8029'
            '/api/messages/mirbaqeri_ir/8029'
            '/api/channel/mirbaqeri_ir/8029'
            '/api/file/mirbaqeri_ir/8029'
          )
          accepts=(
            'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
            'application/octet-stream'
            'audio/mpeg,audio/*;q=0.9,*/*;q=0.1'
          )
          index=0
          for path in "${candidates[@]}"; do
            for accept in "${accepts[@]}"; do
              index=$((index + 1))
              dir="run-reports/eitaa-endpoints/${index}"
              mkdir -p "$dir"
              url="${base}${path}"
              printf '%s\n' "$url" > "$dir/url.txt"
              printf '%s\n' "$accept" > "$dir/accept.txt"
              set +e
              curl -L --compressed -sS --max-time 90 \
                -A 'Mozilla/5.0 (Linux; Android 14; Pixel 8) AppleWebKit/537.36 Chrome/126 Mobile Safari/537.36' \
                -H "Accept: $accept" \
                -H 'Referer: https://eitaa.com/mirbaqeri_ir/8029' \
                -H 'Origin: https://eitaa.com' \
                -H 'X-Requested-With: XMLHttpRequest' \
                -H 'Range: bytes=0-1048575' \
                -D "$dir/headers.txt" \
                -o "$dir/body.bin" \
                -w 'http_code=%{http_code}\ncontent_type=%{content_type}\nsize_download=%{size_download}\nurl_effective=%{url_effective}\n' \
                "$url" > "$dir/metrics.txt" 2> "$dir/stderr.txt"
              code=$?
              printf '%s\n' "$code" > "$dir/curl-exit.txt"
              file "$dir/body.bin" > "$dir/file.txt" 2>&1 || true
              sha256sum "$dir/body.bin" > "$dir/sha256.txt" 2>&1 || true
              set -e
            done
          done

      - name: Summarize endpoint responses
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          rows = []
          for directory in sorted(Path('run-reports/eitaa-endpoints').iterdir(), key=lambda p: int(p.name)):
              headers = (directory / 'headers.txt').read_text(encoding='utf-8', errors='replace')
              metrics = (directory / 'metrics.txt').read_text(encoding='utf-8', errors='replace')
              row = {
                  'index': int(directory.name),
                  'url': (directory / 'url.txt').read_text().strip(),
                  'accept': (directory / 'accept.txt').read_text().strip(),
                  'bytes_saved': (directory / 'body.bin').stat().st_size,
                  'file': (directory / 'file.txt').read_text(errors='replace').strip(),
                  'metrics': dict(
                      line.split('=', 1) for line in metrics.splitlines() if '=' in line
                  ),
                  'content_disposition': '',
                  'location': '',
              }
              for line in headers.splitlines():
                  lower = line.lower()
                  if lower.startswith('content-disposition:'):
                      row['content_disposition'] = line.split(':', 1)[1].strip()
                  elif lower.startswith('location:'):
                      row['location'] = line.split(':', 1)[1].strip()
              rows.append(row)
          Path('run-reports/eitaa-endpoints/summary.json').write_text(
              json.dumps(rows, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          for row in rows:
              content_type = row['metrics'].get('content_type', '')
              size = row['bytes_saved']
              if not content_type.startswith('text/html') or size > 1_500_000:
                  print(json.dumps(row, ensure_ascii=False))
          PY

      - name: Upload endpoint probes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-eitaa-endpoints
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
