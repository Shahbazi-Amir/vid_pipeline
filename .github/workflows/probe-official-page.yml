name: Probe Official Video Page

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  pull-requests: write

concurrency:
  group: probe-official-video-page
  cancel-in-progress: true

jobs:
  probe:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/run-season2-catalog'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Probe official Aparat publisher
        run: |
          python - <<'PY'
          import html
          import json
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path

          USER_AGENT = "FinancialVideoRAGPipeline/1.3 (+https://github.com/Shahbazi-Amir/vid_pipeline)"
          KNOWN_HASH = "ndjyr04"

          def fetch(url):
              request = urllib.request.Request(url, headers={"User-Agent": USER_AGENT, "Accept": "application/json,text/html,*/*"})
              with urllib.request.urlopen(request, timeout=30) as response:
                  raw = response.read()
                  return raw.decode("utf-8", errors="replace"), response.geturl(), response.headers.get("Content-Type", "")

          def walk(value, path=""):
              if isinstance(value, dict):
                  for key, item in value.items():
                      yield from walk(item, f"{path}.{key}" if path else str(key))
              elif isinstance(value, list):
                  for index, item in enumerate(value):
                      yield from walk(item, f"{path}[{index}]")
              elif isinstance(value, (str, int, float, bool)) or value is None:
                  yield path, value

          result = {"known_hash": KNOWN_HASH, "requests": [], "publisher_candidates": [], "video_candidates": []}
          urls = [
              f"https://www.aparat.com/etc/api/video/videohash/{KNOWN_HASH}",
              f"https://www.aparat.com/v/{KNOWN_HASH}",
          ]
          payloads = []
          for url in urls:
              try:
                  raw, final_url, content_type = fetch(url)
                  record = {"url": url, "final_url": final_url, "content_type": content_type, "length": len(raw)}
                  result["requests"].append(record)
                  try:
                      data = json.loads(raw)
                      payloads.append(data)
                      record["json"] = True
                      for path, value in walk(data):
                          if isinstance(value, str):
                              lowered = path.lower()
                              if any(token in lowered for token in ("username", "user_name", "channel", "profile")):
                                  result["publisher_candidates"].append({"path": path, "value": value})
                              if any(token in lowered for token in ("videohash", "video_hash", "title")):
                                  result["video_candidates"].append({"path": path, "value": value})
                  except json.JSONDecodeError:
                      decoded = html.unescape(urllib.parse.unquote(raw.replace("\\/", "/")))
                      for match in re.findall(r'(?:username|user_name|channel)["\']?\s*[:=]\s*["\']([^"\']+)', decoded, flags=re.I):
                          result["publisher_candidates"].append({"path": "html", "value": match})
                      for match in re.findall(r'(?:/v/|videohash/)([A-Za-z0-9_-]{4,})', decoded, flags=re.I):
                          result["video_candidates"].append({"path": "html", "value": match})
              except Exception as exc:
                  result["requests"].append({"url": url, "error": str(exc)})

          publishers = []
          for item in result["publisher_candidates"]:
              value = str(item["value"]).strip().strip("/")
              if value and re.fullmatch(r"[A-Za-z0-9_.-]{2,80}", value):
                  publishers.append(value)
          publishers = list(dict.fromkeys(publishers))
          result["publishers"] = publishers

          for publisher in publishers[:10]:
              for endpoint in (
                  f"https://www.aparat.com/etc/api/videoByUser/username/{publisher}/perpage/100",
                  f"https://www.aparat.com/etc/api/videoByUser/username/{publisher}/perpage/100/page/1",
                  f"https://www.aparat.com/{publisher}/videos",
              ):
                  try:
                      raw, final_url, content_type = fetch(endpoint)
                      record = {"url": endpoint, "final_url": final_url, "content_type": content_type, "length": len(raw)}
                      result["requests"].append(record)
                      try:
                          data = json.loads(raw)
                          record["json"] = True
                          for path, value in walk(data):
                              if isinstance(value, str) and any(token in path.lower() for token in ("videohash", "video_hash", "title")):
                                  result["video_candidates"].append({"publisher": publisher, "path": path, "value": value})
                      except json.JSONDecodeError:
                          decoded = html.unescape(urllib.parse.unquote(raw.replace("\\/", "/")))
                          for match in re.findall(r'(?:/v/|videohash/)([A-Za-z0-9_-]{4,})', decoded, flags=re.I):
                              result["video_candidates"].append({"publisher": publisher, "path": "html", "value": match})
                  except Exception as exc:
                      result["requests"].append({"url": endpoint, "error": str(exc)})

          deduped = []
          seen = set()
          for item in result["video_candidates"]:
              key = json.dumps(item, ensure_ascii=False, sort_keys=True)
              if key not in seen:
                  seen.add(key)
                  deduped.append(item)
          result["video_candidates"] = deduped[:2000]
          Path("data").mkdir(exist_ok=True)
          Path("data/aparat-channel-probe.json").write_text(json.dumps(result, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(json.dumps({"publishers": publishers, "video_candidates": len(result["video_candidates"]), "requests": len(result["requests"])}, ensure_ascii=False))
          PY

      - name: Upload probe
        uses: actions/upload-artifact@v4
        with:
          name: aparat-channel-probe
          path: data/aparat-channel-probe.json
          retention-days: 7

      - name: Report probe
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          summary=$(python - <<'PY'
          import json
          data = json.load(open("data/aparat-channel-probe.json", encoding="utf-8"))
          print(f"publishers={data.get('publishers')}, candidates={len(data.get('video_candidates') or [])}, requests={len(data.get('requests') or [])}")
          PY
          )
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Aparat publisher probe finished — $summary — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
