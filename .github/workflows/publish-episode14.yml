name: Publish Asre Shirin Episode 14

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/publish-episode14'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download verified episode 14 artifact
        uses: actions/download-artifact@v4
        with:
          artifact-ids: 8492285179
          path: recovered
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: 29781219306

      - name: Validate and publish only episode 14
        shell: bash
        run: |
          set -euo pipefail
          source_dir="recovered/episode-01"
          destination="processing/asre-shirin-season-2/episode-01"

          test -s "$source_dir/episode-01.raw.md"
          test -s "$source_dir/episode-01.review.md"
          test -s "$source_dir/episode-01.raw.json"
          test -s "$source_dir/episode.json"
          test -s "$source_dir/result.json"

          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("recovered/episode-01")
          episode = json.loads((root / "episode.json").read_text(encoding="utf-8"))
          result = json.loads((root / "result.json").read_text(encoding="utf-8"))
          assert episode["overall_episode"] == 14
          assert episode["season_episode"] == 1
          assert episode["source_verified"] is True
          assert episode["speaker_verified"] is True
          assert result["status"] == "needs_review"
          assert result["reviewed"] is False
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin agent/season2-processing || true
          if git show-ref --verify --quiet refs/remotes/origin/agent/season2-processing; then
            git switch -C agent/season2-processing origin/agent/season2-processing
          else
            git switch -c agent/season2-processing origin/main
          fi

          rm -rf "$destination"
          mkdir -p "$(dirname "$destination")"
          cp -R "$source_dir" "$destination"
          git add -f "$destination"

          if git diff --cached --quiet; then
            echo "Episode 14 is already published"
          else
            git commit -m "Process Asre Shirin season 2 episode 14"
            git push origin HEAD:agent/season2-processing
          fi

      - name: Report result
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "$GITHUB_REPOSITORY" \
            --body "Episode 14 isolated publication finished — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
