name: Probe Telewebion and official mirrors

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Probe official Telegram channel
        shell: bash
        run: |
          mkdir -p run-reports/telegram
          urls=(
            'https://t.me/s/ostad_mirbaqeri?q=%D8%A8%D9%87%20%D9%88%D9%82%D8%AA%20%D8%A7%DB%8C%D8%B1%D8%A7%D9%86'
            'https://t.me/s/ostad_mirbaqeri?q=%D8%AA%D9%81%D8%A7%D9%88%D8%AA%20%D8%B1%D8%A7%D9%87%D8%A8%D8%B1%D8%AF%DB%8C'
            'https://t.me/s/ostad_mirbaqeri?q=%D9%82%D8%B5%D8%A7%D8%B5'
            'https://t.me/s/ostad_mirbaqeri'
          )
          index=0
          for url in "${urls[@]}"; do
            index=$((index + 1))
            curl -L --compressed -sS --max-time 90 \
              -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36' \
              "$url" -o "run-reports/telegram/${index}.html" || true
          done
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          results = []
          for path in sorted(Path('run-reports/telegram').glob('*.html')):
              text = path.read_text(encoding='utf-8', errors='replace')
              posts = sorted(set(re.findall(r'data-post="([^"]+)"', text)))
              media = sorted(set(re.findall(r'(?:src|href)="(https?://[^"]+(?:video|file|document|telesco\.pe)[^"]*)"', text)))
              matches = []
              for pattern in ('به وقت ایران', 'تفاوت راهبردی', 'قصاص', 'انتقام', 'روایت فتح', '0x16c79674'):
                  if pattern in text:
                      matches.append(pattern)
              results.append({
                  'file': str(path),
                  'bytes': len(text.encode('utf-8')),
                  'posts': posts,
                  'media_urls': media,
                  'matched_terms': matches,
              })
          Path('run-reports/telegram/results.json').write_text(
              json.dumps(results, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload mirror probes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-mirror-probes
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
