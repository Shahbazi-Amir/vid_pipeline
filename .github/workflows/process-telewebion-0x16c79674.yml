name: Process Telewebion 0x16c79674

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: process-telewebion-0x16c79674
  cancel-in-progress: true

jobs:
  process:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/telewebion-run-clean'
    runs-on: windows-latest
    timeout-minutes: 330
    env:
      SOURCE_URL: https://telewebion.ir/episode/0x16c79674
      MEDIA_URL: https://cdna.telewebion.ir/irinn/episode/0x16c79674/playlist.m3u8
      OUTPUT_BRANCH: agent/telewebion-0x16c79674-output
      TARGET_DIR: processing/telewebion-0x16c79674
      WORK_DIR: work/telewebion-0x16c79674
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize observable output branch
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -C $env:OUTPUT_BRANCH
          if (Test-Path $env:TARGET_DIR) { Remove-Item -Recurse -Force $env:TARGET_DIR }
          New-Item -ItemType Directory -Force "$env:TARGET_DIR/reports" | Out-Null
          $status = @{
            status = 'running'
            source_url = $env:SOURCE_URL
            media_url = $env:MEDIA_URL
            workflow_run_id = $env:GITHUB_RUN_ID
            started_at = (Get-Date).ToUniversalTime().ToString('o')
          } | ConvertTo-Json
          Set-Content -Path "$env:TARGET_DIR/status.json" -Value $status -Encoding utf8NoBOM
          git add -f "$env:TARGET_DIR/status.json"
          git commit -m 'Start Telewebion 0x16c79674 processing'
          git push --force origin "HEAD:$env:OUTPUT_BRANCH"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          if (-not (Get-Command ffmpeg -ErrorAction SilentlyContinue)) {
            choco install ffmpeg -y --no-progress
          }
          ffmpeg -version
          python -m pip install --upgrade pip
          pip install -e '.[all]'

      - name: Fetch official manifest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:WORK_DIR | Out-Null
          New-Item -ItemType Directory -Force 'run-reports' | Out-Null
          curl.exe -4 --fail --location `
            --retry 10 --retry-all-errors --retry-delay 3 `
            --connect-timeout 30 --max-time 240 `
            -A 'Mozilla/5.0' `
            $env:MEDIA_URL `
            -o "$env:WORK_DIR/playlist.m3u8"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $size = (Get-Item "$env:WORK_DIR/playlist.m3u8").Length
          Set-Content -Path 'run-reports/manifest-size.txt' -Value $size -Encoding utf8NoBOM
          Get-Content "$env:WORK_DIR/playlist.m3u8" -TotalCount 30 |
            Set-Content 'run-reports/manifest-head.txt' -Encoding utf8NoBOM

      - name: Extract and normalize official audio
        shell: pwsh
        run: |
          & ffmpeg -hide_banner -loglevel warning -nostdin -y `
            -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 10 `
            -user_agent 'Mozilla/5.0' `
            -i $env:MEDIA_URL `
            -vn -ac 1 -ar 16000 -c:a pcm_s16le `
            "$env:WORK_DIR/audio-16k-mono.wav" `
            2>&1 | Tee-Object -FilePath 'run-reports/ffmpeg-audio.log'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & ffprobe -v error `
            -show_entries 'format=duration:stream=codec_type,codec_name,sample_rate,channels' `
            -of json "$env:WORK_DIR/audio-16k-mono.wav" `
            | Set-Content 'run-reports/audio-probe.json' -Encoding utf8NoBOM
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Transcribe and machine-clean Persian text
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:TARGET_DIR/raw" | Out-Null
          New-Item -ItemType Directory -Force "$env:TARGET_DIR/machine-final" | Out-Null
          $script = @'
          import json
          import os
          from pathlib import Path

          from vid_pipeline.clean import clean_transcript
          from vid_pipeline.transcribe import TranscriptionConfig, transcribe_audio

          source_url = os.environ["SOURCE_URL"]
          media_url = os.environ["MEDIA_URL"]
          work = Path(os.environ["WORK_DIR"])
          target = Path(os.environ["TARGET_DIR"])
          title = "به وقت ایران؛ تفاوت راهبردی قصاص و انتقام"

          config = TranscriptionConfig(
              model="small",
              device="cpu",
              compute_type="int8",
              language="fa",
              beam_size=5,
              vad_filter=True,
              word_timestamps=True,
              condition_on_previous_text=False,
          )
          result = transcribe_audio(
              work / "audio-16k-mono.wav",
              target / "raw" / "transcript.raw.json",
              target / "raw" / "transcript.raw.md",
              config,
          )
          cleaned = clean_transcript(
              target / "raw" / "transcript.raw.json",
              target / "machine-final" / "transcript.final.md",
              target / "machine-final" / "transcript.final.txt",
              title=title,
              source_url=source_url,
              max_words=80,
          )
          source = {
              "schema_version": 1,
              "source_url": source_url,
              "media_url": media_url,
              "program": "به وقت ایران",
              "network": "شبکه خبر",
              "guest": "آیت‌الله سیدمحمدمهدی میرباقری",
              "date": "۱۴۰۵/۰۴/۱۶",
              "title": title,
              "duration_seconds": result.get("duration"),
          }
          outcome = {
              "schema_version": 1,
              "status": "needs_editorial_review",
              "model": result.get("model"),
              "language": result.get("language"),
              "segments": len(result.get("segments", [])),
              "cleaned": cleaned,
          }
          (target / "source.json").write_text(
              json.dumps(source, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          (target / "result.json").write_text(
              json.dumps(outcome, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          print(json.dumps(outcome, ensure_ascii=False, indent=2))
          '@
          $script | python - 2>&1 | Tee-Object -FilePath 'run-reports/transcribe.log'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build compact review audio
        shell: pwsh
        run: |
          & ffmpeg -hide_banner -loglevel error -nostdin -y `
            -i "$env:WORK_DIR/audio-16k-mono.wav" `
            -ac 1 -ar 16000 -codec:a libmp3lame -b:a 32k `
            "$env:TARGET_DIR/review-audio.mp3"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & ffprobe -v error -show_entries format=duration `
            -of default=noprint_wrappers=1:nokey=1 `
            "$env:WORK_DIR/audio-16k-mono.wav" `
            | Set-Content "$env:TARGET_DIR/reports/duration-seconds.txt" -Encoding utf8NoBOM

      - name: Complete package and push output branch
        shell: pwsh
        run: |
          Copy-Item -Recurse -Force 'run-reports/*' "$env:TARGET_DIR/reports/"
          $status = @{
            status = 'technical_processing_completed'
            review_status = 'needs_editorial_review'
            source_url = $env:SOURCE_URL
            media_url = $env:MEDIA_URL
            workflow_run_id = $env:GITHUB_RUN_ID
            completed_at = (Get-Date).ToUniversalTime().ToString('o')
          } | ConvertTo-Json
          Set-Content -Path "$env:TARGET_DIR/status.json" -Value $status -Encoding utf8NoBOM
          git add -f $env:TARGET_DIR
          git commit -m 'Store Telewebion 0x16c79674 technical output'
          git push --force origin "HEAD:$env:OUTPUT_BRANCH"

      - name: Persist failure diagnostics
        if: failure()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:TARGET_DIR/reports" | Out-Null
          if (Test-Path 'run-reports') {
            Copy-Item -Recurse -Force 'run-reports/*' "$env:TARGET_DIR/reports/" -ErrorAction SilentlyContinue
          }
          $status = @{
            status = 'failed'
            source_url = $env:SOURCE_URL
            media_url = $env:MEDIA_URL
            workflow_run_id = $env:GITHUB_RUN_ID
            failed_at = (Get-Date).ToUniversalTime().ToString('o')
          } | ConvertTo-Json
          Set-Content -Path "$env:TARGET_DIR/status.json" -Value $status -Encoding utf8NoBOM
          git add -f $env:TARGET_DIR
          git commit -m 'Record Telewebion 0x16c79674 failure' 2>$null
          git push --force origin "HEAD:$env:OUTPUT_BRANCH"

      - name: Upload transcript package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-transcript
          path: |
            processing/telewebion-0x16c79674/**
            run-reports/**
          retention-days: 30
          if-no-files-found: warn
