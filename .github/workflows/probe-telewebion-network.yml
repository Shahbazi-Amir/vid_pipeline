name: Probe Telewebion network

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  variant-probe:
    if: github.event.pull_request.head.ref == 'agent/telewebion-run-clean'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch master and 480p variant
        shell: bash
        run: |
          set -euxo pipefail
          master='https://cdna.telewebion.ir/irinn/episode/0x16c79674/playlist.m3u8'
          effective_master=$(curl -4 --fail --location \
            --retry 8 --retry-all-errors --retry-delay 2 \
            --connect-timeout 30 --max-time 180 \
            -A 'Mozilla/5.0' \
            -w '%{url_effective}' -o master.m3u8 "$master")
          echo "EFFECTIVE_MASTER=$effective_master"
          base="${effective_master%/*}"
          variant="$base/480p/index.m3u8"
          effective_variant=$(curl -4 --fail --location \
            --retry 8 --retry-all-errors --retry-delay 2 \
            --connect-timeout 30 --max-time 180 \
            -A 'Mozilla/5.0' \
            -w '%{url_effective}' -o variant.m3u8 "$variant")
          echo "EFFECTIVE_VARIANT=$effective_variant"
          echo '--- MASTER ---'
          cat master.m3u8
          echo '--- VARIANT HEAD ---'
          head -n 60 variant.m3u8
          echo '--- VARIANT TAIL ---'
          tail -n 20 variant.m3u8
          echo '--- MEDIA REFERENCES ---'
          grep -v '^#' variant.m3u8 | sed '/^$/d' | head -n 20
          echo "SEGMENT_COUNT=$(grep -v '^#' variant.m3u8 | sed '/^$/d' | wc -l)"
