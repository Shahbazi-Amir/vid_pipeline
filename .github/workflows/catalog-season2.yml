name: Catalog Asre Shirin Season 2

on:
  push:
    branches: [main]
    paths:
      - scripts/catalog_asre_shirin.py
      - .github/workflows/catalog-season2.yml
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: catalog-asre-shirin-season-2
  cancel-in-progress: false

jobs:
  catalog:
    if: >-
      (github.event_name != 'issues' || github.event.issue.title == '[run] Catalog Asre Shirin season 2') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/run-season2-catalog') &&
      (github.event_name != 'pull_request_target' || github.event.pull_request.head.ref == 'agent/run-season2-catalog')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Report start
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "Catalog workflow started — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Report PR start
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Catalog workflow started — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build catalog from official site
        id: catalog
        shell: bash
        run: |
          set +e
          PYTHONPATH=src python scripts/catalog_asre_shirin.py \
            --output data/asre-shirin-season-2-catalog.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload catalog diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asre-shirin-season-2-catalog
          path: data/asre-shirin-season-2-catalog.json
          retention-days: 7

      - name: Commit catalog result
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/asre-shirin-season-2-catalog.json
          if git diff --cached --quiet; then
            echo "Catalog is unchanged"
          else
            git commit -m "Catalog Asre Shirin season 2"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Report result
        if: always() && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          EXIT_CODE: ${{ steps.catalog.outputs.exit_code }}
        run: |
          summary=$(python -c 'import json; d=json.load(open("data/asre-shirin-season-2-catalog.json")); print(f"status={d.get('"'"'status'"'"')}, season1={d.get('"'"'season_one_matches'"'"')}, season2={d.get('"'"'season_two_matches'"'"')}, likely_pages={d.get('"'"'likely_pages'"'"')}")')
          gh issue comment "${{ github.event.issue.number }}" \
            --body "Catalog workflow finished — $summary — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Report PR result
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
        env:
          GH_TOKEN: ${{ github.token }}
          EXIT_CODE: ${{ steps.catalog.outputs.exit_code }}
        run: |
          summary=$(python -c 'import json; d=json.load(open("data/asre-shirin-season-2-catalog.json")); print(f"status={d.get('"'"'status'"'"')}, season1={d.get('"'"'season_one_matches'"'"')}, season2={d.get('"'"'season_two_matches'"'"')}, likely_pages={d.get('"'"'likely_pages'"'"')}")')
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Catalog workflow finished — $summary — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Enforce ready catalog
        if: steps.catalog.outputs.exit_code != '0'
        run: |
          echo "Catalog needs investigation; committed diagnostics for repair."
          exit 1
