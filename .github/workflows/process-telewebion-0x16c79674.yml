name: Process Telewebion 0x16c79674

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all]'

      - name: Inspect source
        shell: bash
        run: |
          set -o pipefail
          mkdir -p run-reports
          vid-pipeline inspect 'https://telewebion.ir/episode/0x16c79674' \
            --no-check-certificate \
            | tee run-reports/inspect.json

      - name: Process video
        shell: bash
        run: |
          set -o pipefail
          vid-pipeline run-url 'https://telewebion.ir/episode/0x16c79674' \
            --name telewebion-0x16c79674 \
            --no-check-certificate \
            --language fa \
            --model small \
            --device cpu \
            --compute-type int8 \
            --beam-size 5 \
            --max-paragraph-words 80 \
            | tee run-reports/run.json

      - name: Build review audio
        if: success()
        run: |
          wav=$(find outputs -path '*/audio/audio-16k-mono.wav' -print -quit)
          test -n "$wav"
          ffmpeg -hide_banner -loglevel error -y -i "$wav" \
            -ac 1 -ar 16000 -b:a 48k run-reports/review-audio.mp3
          ffprobe -v error -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 "$wav" \
            > run-reports/duration-seconds.txt

      - name: Upload transcript package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-transcript
          path: |
            outputs/**/state.json
            outputs/**/source.json
            outputs/**/video-info.json
            outputs/**/result.json
            outputs/**/raw/**
            outputs/**/final/**
            run-reports/**
          retention-days: 30
          if-no-files-found: warn

      - name: Upload review audio
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-audio
          path: run-reports/review-audio.mp3
          retention-days: 30
          if-no-files-found: error
