name: Probe official Be Vaghte Iran channel

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Fetch official channel search pages
        shell: bash
        run: |
          mkdir -p run-reports/bevaqteiran
          urls=(
            'https://t.me/s/bevaqteiran?q=%D9%85%DB%8C%D8%B1%D8%A8%D8%A7%D9%82%D8%B1%DB%8C'
            'https://t.me/s/bevaqteiran?q=%D9%82%D8%B5%D8%A7%D8%B5'
            'https://t.me/s/bevaqteiran?q=%D8%A7%D9%86%D8%AA%D9%82%D8%A7%D9%85'
            'https://t.me/s/bevaqteiran?q=%D8%B1%D9%88%D8%A7%DB%8C%D8%AA%20%D9%81%D8%AA%D8%AD'
            'https://t.me/s/bevaqteiran?q=%DB%B1%DB%B6%20%D8%AA%DB%8C%D8%B1'
          )
          index=0
          for url in "${urls[@]}"; do
            index=$((index + 1))
            printf '%s\n' "$url" > "run-reports/bevaqteiran/${index}-url.txt"
            curl -L --compressed -sS --max-time 120 \
              -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36' \
              "$url" -o "run-reports/bevaqteiran/${index}.html" || true
          done

      - name: Parse matching posts and media
        shell: bash
        run: |
          python - <<'PY'
          import html
          import json
          import re
          from pathlib import Path

          results = []
          for path in sorted(Path('run-reports/bevaqteiran').glob('*.html')):
              raw = html.unescape(path.read_text(encoding='utf-8', errors='replace'))
              post_ids = sorted(set(re.findall(r'data-post="bevaqteiran/(\d+)"', raw)), key=int)
              for post_id in post_ids:
                  marker = f'data-post="bevaqteiran/{post_id}"'
                  start = raw.find(marker)
                  next_pos = raw.find('data-post="bevaqteiran/', start + len(marker))
                  block = raw[start:next_pos if next_pos > 0 else len(raw)]
                  plain = re.sub(r'<br\s*/?>', '\n', block, flags=re.I)
                  plain = re.sub(r'<[^>]+>', ' ', plain)
                  plain = ' '.join(html.unescape(plain).split())
                  urls = sorted(set(re.findall(r'https?://[^"\'<> ]+', block)))
                  style_urls = sorted(set(re.findall(r"url\(['\"]?([^'\")]+)", block)))
                  srcs = sorted(set(re.findall(r'(?:src|href)="([^"]+)"', block)))
                  media = [
                      value for value in urls + style_urls + srcs
                      if any(term in value.lower() for term in (
                          '.mp3', '.m4a', '.ogg', '.wav', '.mp4', '.m3u8',
                          'video', 'audio', 'document', 'telesco.pe', 'cdn'
                      ))
                  ]
                  duration = re.findall(r'(?:message_video_duration[^>]*>|duration[^>]*>)([^<]+)', block, flags=re.I)
                  if any(term in plain for term in ('میرباقری', 'قصاص', 'انتقام', 'روایت فتح', '۱۶ تیر', '16 تیر')):
                      results.append({
                          'source_file': str(path),
                          'post_id': int(post_id),
                          'post_url': f'https://t.me/bevaqteiran/{post_id}',
                          'text': plain,
                          'duration': duration,
                          'media_candidates': sorted(set(media)),
                          'html_block': block,
                      })
          Path('run-reports/bevaqteiran/results.json').write_text(
              json.dumps(results, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps([
              {k: row[k] for k in ('post_id', 'post_url', 'duration', 'media_candidates')}
              for row in results
          ], ensure_ascii=False, indent=2))
          PY

      - name: Upload official-channel probe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-bevaqteiran
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
