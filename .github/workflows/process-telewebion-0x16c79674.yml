name: Inspect Telegram widget media requests

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Telegram widget resources
        shell: bash
        run: |
          mkdir -p run-reports/widget
          curl -L --compressed -sS \
            -e 'https://t.me/ostad_mirbaqeri/2102?embed=1&mode=tme' \
            'https://oauth.tg.dev/js/telegram-widget.js?24' \
            -o run-reports/widget/oauth-widget.js || true
          curl -L --compressed -sS \
            -e 'https://t.me/ostad_mirbaqeri/2102?embed=1&mode=tme' \
            'https://telegram.org/js/telegram-widget.js?24' \
            -o run-reports/widget/telegram-widget.js || true
          curl -L --compressed -sS \
            'https://t.me/ostad_mirbaqeri/2102?embed=1&mode=tme' \
            -o run-reports/widget/post.html || true

      - name: Extract endpoint clues
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          report = {}
          for path in sorted(Path('run-reports/widget').glob('*')):
              text = path.read_text(encoding='utf-8', errors='replace')
              urls = sorted(set(re.findall(r'https?://[^"\'<> )]+', text)))
              endpoints = sorted(set(re.findall(r'["\'](/[^"\']{1,160})["\']', text)))
              keywords = {}
              for word in ('peer_hash', 'peer-hash', 'post-id', 'document', 'audio', 'download', 'telesco', 'ajax', 'api'):
                  positions = [m.start() for m in re.finditer(re.escape(word), text, flags=re.I)]
                  keywords[word] = [
                      text[max(0, pos - 250):pos + 500]
                      for pos in positions[:20]
                  ]
              report[str(path)] = {
                  'bytes': len(text.encode('utf-8')),
                  'urls': urls,
                  'endpoints': endpoints,
                  'keyword_contexts': keywords,
              }
          Path('run-reports/widget/results.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload widget inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-widget-inspection
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
