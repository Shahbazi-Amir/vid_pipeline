name: Catalog Asre Shirin Season 2

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  pull-requests: write

concurrency:
  group: catalog-asre-shirin-season-2-v3
  cancel-in-progress: true

jobs:
  catalog:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/run-season2-catalog'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Report PR start
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Catalog workflow started — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply bounded crawl and embed fix
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/catalog_asre_shirin.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace("timeout: int = 45", "timeout: int = 12")
          text = text.replace("max_pages: int = 150", "max_pages: int = 40")
          text = text.replace("max_pages: int = 45", "max_pages: int = 20")
          text = text.replace(
              "(?:v/|video/video/embed/videohash/)",
              "(?:v/|embed/|video/video/embed/videohash/)",
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Build catalog from official sources
        id: catalog
        shell: bash
        run: |
          set +e
          timeout 12m env PYTHONPATH=src python scripts/catalog_asre_shirin.py \
            --output data/asre-shirin-season-2-catalog.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ ! -f data/asre-shirin-season-2-catalog.json ]; then
            printf '{"status":"crawl_timeout","season_two":[],"season_two_matches":0}\n' \
              > data/asre-shirin-season-2-catalog.json
          fi
          exit 0

      - name: Upload catalog diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asre-shirin-season-2-catalog
          path: data/asre-shirin-season-2-catalog.json
          retention-days: 7

      - name: Report PR result
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          summary=$(python - <<'PY'
          import json
          data = json.load(open("data/asre-shirin-season-2-catalog.json", encoding="utf-8"))
          print(
              f"status={data.get('status')}, "
              f"season1={data.get('season_one_matches')}, "
              f"season2={data.get('season_two_matches')}, "
              f"blog={data.get('blog_detail_urls')}, "
              f"telegram={data.get('telegram_official_urls')}"
          )
          PY
          )
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Catalog workflow finished — $summary — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Enforce usable catalog
        run: |
          python - <<'PY'
          import json
          data = json.load(open("data/asre-shirin-season-2-catalog.json", encoding="utf-8"))
          if not data.get("season_two"):
              raise SystemExit("No published season-two episodes were discovered")
          print(f"Discovered {len(data['season_two'])} published season-two episodes")
          PY
