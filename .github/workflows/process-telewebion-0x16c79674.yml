name: Process Telewebion 0x16c79674

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all]'

      - name: Probe direct episode media
        shell: bash
        run: |
          mkdir -p run-reports/direct-probes
          urls=(
            'https://cdna.telewebion.ir/irinn/episode/0x16c79674/playlist.m3u8'
            'https://cdnw.telewebion.com/irinn/episode/0x16c79674/playlist.m3u8'
            'https://cdna.telewebion.ir/irinn/episode/382178932/playlist.m3u8'
            'https://cdnw.telewebion.com/irinn/episode/382178932/playlist.m3u8'
          )
          index=0
          for url in "${urls[@]}"; do
            index=$((index + 1))
            printf '%s\n' "$url" > "run-reports/direct-probes/${index}-url.txt"
            set +e
            curl -k -L --http1.1 -sS \
              --connect-timeout 20 --max-time 60 \
              -D "run-reports/direct-probes/${index}-headers.txt" \
              -o "run-reports/direct-probes/${index}-body.txt" \
              -w '%{http_code}\n' "$url" \
              > "run-reports/direct-probes/${index}-status.txt"
            ffprobe -v error -show_entries format=duration \
              -of default=noprint_wrappers=1:nokey=1 "$url" \
              > "run-reports/direct-probes/${index}-ffprobe.txt" 2>&1
            set -e
          done

      - name: Probe Telewebion GraphQL API
        shell: bash
        run: |
          mkdir -p run-reports
          cat > run-reports/graphql-request.json <<'JSON'
          {
            "operationName": "getEpisodeDetail",
            "query": "query getEpisodeDetail($EpisodeId: [ID!]) @cacheControl(maxAge: 60) { queryEpisode(filter: {EpisodeID: $EpisodeId}, first: 1) { title program { ProgramID title } image view_count duration started_at created_at channel { ChannelID name descriptor } tags { name } } }",
            "variables": {"EpisodeId": "0x16c79674"}
          }
          JSON
          set +e
          curl -k --http1.1 -sS \
            -D run-reports/graphql-headers.txt \
            -o run-reports/graphql-response.json \
            -w '%{http_code}\n' \
            -X POST 'https://graph.telewebion.ir/graphql' \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            -H 'Origin: https://telewebion.ir' \
            -H 'Referer: https://telewebion.ir/' \
            -H 'User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36' \
            --data-binary @run-reports/graphql-request.json \
            > run-reports/graphql-status.txt
          exit 0

      - name: Inspect source
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          vid-pipeline inspect 'https://telewebion.ir/episode/0x16c79674' \
            --no-check-certificate \
            2>&1 | tee run-reports/inspect.log

      - name: Upload probe package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-probes
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
