name: Probe Castbox podcast feed

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Castbox channel and API candidates
        shell: bash
        run: |
          mkdir -p run-reports/castbox
          urls=(
            'https://castbox.fm/channel/id4800546'
            'https://castbox.fm/channel/%D8%A7%D8%B3%DA%A9%D8%B1%DB%8C%D9%86-%D9%BE%D8%A7%D8%AF%DA%A9%D8%B3%D8%AA-id4800546'
            'https://api.castbox.fm/v1/channel?cid=4800546'
            'https://api.castbox.fm/v2/channel?cid=4800546'
            'https://api.castbox.fm/v3/channel?cid=4800546'
            'https://api.castbox.fm/v1/channels/4800546'
            'https://api.castbox.fm/v2/channels/4800546'
            'https://api.castbox.fm/v3/channels/4800546'
            'https://api.castbox.fm/v1/channel/4800546'
            'https://api.castbox.fm/v2/channel/4800546'
            'https://api.castbox.fm/v3/channel/4800546'
            'https://castbox.fm/channel/id4800546?country=us'
            'https://castbox.fm/channel/id4800546?country=ir'
            'https://castbox.fm/channel/id4800546?reverse=0'
            'https://castbox.fm/channel/id4800546?reverse=1'
          )
          index=0
          for url in "${urls[@]}"; do
            index=$((index + 1))
            dir="run-reports/castbox/${index}"
            mkdir -p "$dir"
            printf '%s\n' "$url" > "$dir/url.txt"
            curl -L --compressed -sS --max-time 120 \
              -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36' \
              -D "$dir/headers.txt" \
              "$url" -o "$dir/body.txt" || true
          done

      - name: Extract feed, episode and audio clues
        shell: bash
        run: |
          python - <<'PY'
          import html
          import json
          import re
          from pathlib import Path

          terms = ('قصاص', 'انتقام', 'روایت فتح', 'میرباقری', 'برنامه 167', 'برنامه ۱۶۷')
          report = []
          for directory in sorted(Path('run-reports/castbox').iterdir(), key=lambda p: int(p.name)):
              body = html.unescape((directory / 'body.txt').read_text(encoding='utf-8', errors='replace'))
              headers = (directory / 'headers.txt').read_text(encoding='utf-8', errors='replace')
              urls = sorted(set(re.findall(r'https?://[^"\'<>\\ ]+', body)))
              interesting = [
                  value for value in urls
                  if any(token in value.lower() for token in (
                      '.mp3', '.m4a', '.ogg', '.wav', '.rss', '/rss', 'feed',
                      'episode', 'audio', 'podcast', 'api.castbox', 'rss.castbox'
                  ))
              ]
              contexts = {}
              for term in ('rss', 'feed', 'audio', 'episode', '4800546', *terms):
                  contexts[term] = [
                      body[max(0, match.start() - 500):match.start() + 1500]
                      for match in list(re.finditer(re.escape(term), body, flags=re.I))[:20]
                  ]
              report.append({
                  'index': int(directory.name),
                  'url': (directory / 'url.txt').read_text().strip(),
                  'bytes': len(body.encode('utf-8')),
                  'content_type': next((line.split(':', 1)[1].strip() for line in headers.splitlines() if line.lower().startswith('content-type:')), ''),
                  'matched_terms': [term for term in terms if term in body],
                  'interesting_urls': interesting,
                  'contexts': contexts,
              })
          Path('run-reports/castbox/results.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps([
              {k: row[k] for k in ('index', 'url', 'bytes', 'content_type', 'matched_terms', 'interesting_urls')}
              for row in report
          ], ensure_ascii=False, indent=2))
          PY

      - name: Upload Castbox probes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-castbox
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
