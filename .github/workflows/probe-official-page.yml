name: Probe Official Video Page

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  pull-requests: write

concurrency:
  group: probe-official-video-page
  cancel-in-progress: true

jobs:
  probe:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/run-season2-catalog'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract official Aparat episode metadata
        run: |
          python - <<'PY'
          import json
          import re
          import urllib.request
          from pathlib import Path

          USER_AGENT = "FinancialVideoRAGPipeline/1.4 (+https://github.com/Shahbazi-Amir/vid_pipeline)"
          PUBLISHER = "fintelligence"
          endpoint = f"https://www.aparat.com/etc/api/videoByUser/username/{PUBLISHER}/perpage/100"
          request = urllib.request.Request(endpoint, headers={"User-Agent": USER_AGENT, "Accept": "application/json,*/*"})
          with urllib.request.urlopen(request, timeout=60) as response:
              payload = json.loads(response.read().decode("utf-8", errors="replace"))

          def find_video_lists(value):
              if isinstance(value, dict):
                  for key, item in value.items():
                      if key.lower() in {"videobyuser", "videos", "video"} and isinstance(item, list):
                          yield item
                      yield from find_video_lists(item)
              elif isinstance(value, list):
                  for item in value:
                      yield from find_video_lists(item)

          rows = []
          for items in find_video_lists(payload):
              for item in items:
                  if not isinstance(item, dict):
                      continue
                  title = str(item.get("title") or item.get("video_title") or "")
                  match = re.search(r"قسمت\s+(بیست[‌\- ]*(?:وسوم|وچهارم|وپنجم|وششم)|23|24|25|26)", title)
                  if not match:
                      continue
                  episode_map = {
                      "بیست‌وسوم": 23, "بیست وسوم": 23, "بیستوسوم": 23, "23": 23,
                      "بیست‌وچهارم": 24, "بیست وچهارم": 24, "بیستوچهارم": 24, "24": 24,
                      "بیست‌وپنجم": 25, "بیست وپنجم": 25, "بیستوپنجم": 25, "25": 25,
                      "بیست‌وششم": 26, "بیست وششم": 26, "بیستوششم": 26, "26": 26,
                  }
                  normalized = match.group(1).replace("-", " ").replace("‌", " ")
                  normalized = " ".join(normalized.split())
                  episode = episode_map.get(normalized, episode_map.get(match.group(1)))
                  if episode not in {23, 24, 25, 26}:
                      continue
                  video_hash = (
                      item.get("videohash") or item.get("videoHash") or item.get("video_hash")
                      or item.get("uid") or item.get("hash")
                  )
                  rows.append({
                      "overall_episode": episode,
                      "season_episode": episode - 13,
                      "title": title,
                      "video_hash": video_hash,
                      "video_url": f"https://www.aparat.com/v/{video_hash}" if video_hash else None,
                      "raw": item,
                  })

          by_episode = {}
          for row in rows:
              by_episode.setdefault(row["overall_episode"], row)
          episodes = [by_episode[number] for number in (23, 24, 25, 26) if number in by_episode]
          output = {
              "publisher": PUBLISHER,
              "endpoint": endpoint,
              "episodes": episodes,
              "found": [row["overall_episode"] for row in episodes],
          }
          Path("data").mkdir(exist_ok=True)
          Path("data/aparat-season2-later-episodes.json").write_text(
              json.dumps(output, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          Path("data/aparat-video-by-user-full.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          print(json.dumps({"found": output["found"], "hashes": [row["video_hash"] for row in episodes]}, ensure_ascii=False))
          if output["found"] != [23, 24, 25, 26]:
              raise SystemExit(f"Expected episodes 23-26, found {output['found']}")
          PY

      - name: Upload probe
        uses: actions/upload-artifact@v4
        with:
          name: aparat-later-episodes
          path: |
            data/aparat-season2-later-episodes.json
            data/aparat-video-by-user-full.json
          retention-days: 7

      - name: Report probe
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          summary=$(python - <<'PY'
          import json
          data = json.load(open("data/aparat-season2-later-episodes.json", encoding="utf-8"))
          print([(row["overall_episode"], row["video_hash"]) for row in data.get("episodes", [])])
          PY
          )
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Aparat later-episode probe finished — $summary — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
