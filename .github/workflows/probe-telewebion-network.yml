name: Probe Telewebion network

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  unix-probe:
    if: github.event.pull_request.head.ref == 'agent/telewebion-run-clean'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Resolve and fetch manifest
        shell: bash
        run: |
          set -x
          python3 - <<'PY'
          import socket
          for host in ('cdna.telewebion.ir', 'telewebion.ir', 'graph.telewebion.ir'):
              try:
                  print(host, socket.getaddrinfo(host, 443, type=socket.SOCK_STREAM))
              except Exception as exc:
                  print(host, 'DNS_ERROR', repr(exc))
          PY
          curl -4 -v --connect-timeout 20 --max-time 60 \
            'https://cdna.telewebion.ir/irinn/episode/0x16c79674/playlist.m3u8' \
            -o manifest.m3u8
          wc -c manifest.m3u8
          head -n 20 manifest.m3u8

  windows-probe:
    if: github.event.pull_request.head.ref == 'agent/telewebion-run-clean'
    runs-on: windows-latest
    steps:
      - name: Resolve and fetch manifest
        shell: pwsh
        run: |
          Resolve-DnsName cdna.telewebion.ir
          curl.exe -4 -v --connect-timeout 20 --max-time 60 `
            'https://cdna.telewebion.ir/irinn/episode/0x16c79674/playlist.m3u8' `
            -o manifest.m3u8
          Get-Item manifest.m3u8 | Format-List Length,FullName
          Get-Content manifest.m3u8 -TotalCount 20
