name: Inspect official Telegram audio post

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Fetch public post variants
        shell: bash
        run: |
          mkdir -p run-reports/post
          urls=(
            'https://t.me/ostad_mirbaqeri/2102?embed=1&mode=tme'
            'https://t.me/ostad_mirbaqeri/2102?single'
            'https://t.me/s/ostad_mirbaqeri/2102'
            'https://telegram.me/ostad_mirbaqeri/2102?embed=1&mode=tme'
          )
          agents=(
            'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36'
            'Mozilla/5.0 (iPhone; CPU iPhone OS 17_5 like Mac OS X) AppleWebKit/605.1.15 Version/17.0 Mobile/15E148 Safari/604.1'
          )
          index=0
          for url in "${urls[@]}"; do
            for agent in "${agents[@]}"; do
              index=$((index + 1))
              printf '%s\n' "$url" > "run-reports/post/${index}-url.txt"
              curl -L --compressed -sS --max-time 90 \
                -A "$agent" -D "run-reports/post/${index}-headers.txt" \
                "$url" -o "run-reports/post/${index}.html" || true
            done
          done

      - name: Extract document and media clues
        shell: bash
        run: |
          python - <<'PY'
          import html
          import json
          import re
          from pathlib import Path

          report = []
          patterns = [
              r'https?://[^"\'<> ]+',
              r'data-[a-zA-Z0-9_-]+="[^"]+"',
              r'<meta[^>]+(?:audio|video|document|file)[^>]*>',
          ]
          for path in sorted(Path('run-reports/post').glob('*.html')):
              text = html.unescape(path.read_text(encoding='utf-8', errors='replace'))
              urls = sorted(set(re.findall(patterns[0], text)))
              interesting_urls = [
                  value for value in urls
                  if any(term in value.lower() for term in (
                      'telesco.pe', '.mp3', '.m4a', '.ogg', '.wav', '.mp4',
                      'document', 'audio', 'file', 'cdn', 'telegram'
                  ))
              ]
              attrs = sorted(set(re.findall(patterns[1], text)))
              metas = sorted(set(re.findall(patterns[2], text, flags=re.I)))
              report.append({
                  'file': str(path),
                  'bytes': len(text.encode('utf-8')),
                  'interesting_urls': interesting_urls,
                  'data_attributes': attrs,
                  'media_meta': metas,
              })
          Path('run-reports/post/results.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload post inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-telegram-post
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
