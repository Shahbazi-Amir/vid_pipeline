name: Lint Diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  lint:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/run-season2-catalog'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Capture diagnostics
        shell: bash
        run: |
          mkdir -p data
          set +e
          ruff check src tests --output-format=json > data/ruff-diagnostics.json
          code=$?
          echo "$code" > data/ruff-exit-code.txt
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: |
            data/ruff-diagnostics.json
            data/ruff-exit-code.txt
          retention-days: 7
