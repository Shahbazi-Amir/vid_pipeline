name: Process Telewebion 0x16c79674

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: process-telewebion-0x16c79674
  cancel-in-progress: true

jobs:
  process:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/telewebion-run-clean'
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      SOURCE_URL: https://telewebion.ir/episode/0x16c79674
      MEDIA_URL: https://cdna.telewebion.ir/irinn/episode/0x16c79674/playlist.m3u8
      OUTPUT_BRANCH: agent/telewebion-0x16c79674-output
      TARGET_DIR: processing/telewebion-0x16c79674
      WORK_DIR: work/telewebion-0x16c79674
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize observable output branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -C "$OUTPUT_BRANCH"
          rm -rf "$TARGET_DIR"
          mkdir -p "$TARGET_DIR/reports"
          cat > "$TARGET_DIR/status.json" <<EOF
          {
            "status": "running",
            "source_url": "$SOURCE_URL",
            "media_url": "$MEDIA_URL",
            "workflow_run_id": "$GITHUB_RUN_ID",
            "started_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git add -f "$TARGET_DIR/status.json"
          git commit -m 'Start Telewebion 0x16c79674 processing'
          git push --force origin "HEAD:$OUTPUT_BRANCH"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          python -m pip install --upgrade pip
          pip install -e '.[all]'

      - name: Fetch official manifest
        run: |
          mkdir -p "$WORK_DIR" run-reports
          curl -4 --fail --location \
            --retry 8 --retry-all-errors --retry-delay 3 \
            --connect-timeout 30 --max-time 180 \
            -A 'Mozilla/5.0' \
            "$MEDIA_URL" \
            -o "$WORK_DIR/playlist.m3u8"
          wc -c "$WORK_DIR/playlist.m3u8" | tee run-reports/manifest-size.txt
          head -n 30 "$WORK_DIR/playlist.m3u8" > run-reports/manifest-head.txt

      - name: Extract and normalize official audio
        run: |
          set -o pipefail
          ffmpeg -hide_banner -loglevel warning -nostdin -y \
            -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 10 \
            -user_agent 'Mozilla/5.0' \
            -i "$MEDIA_URL" \
            -vn -ac 1 -ar 16000 -c:a pcm_s16le \
            "$WORK_DIR/audio-16k-mono.wav" \
            2>&1 | tee run-reports/ffmpeg-audio.log
          ffprobe -v error \
            -show_entries format=duration:stream=codec_type,codec_name,sample_rate,channels \
            -of json "$WORK_DIR/audio-16k-mono.wav" \
            > run-reports/audio-probe.json

      - name: Transcribe and machine-clean Persian text
        run: |
          mkdir -p "$TARGET_DIR/raw" "$TARGET_DIR/machine-final"
          python - <<'PY' 2>&1 | tee run-reports/transcribe.log
          import json
          import os
          from pathlib import Path

          from vid_pipeline.clean import clean_transcript
          from vid_pipeline.transcribe import TranscriptionConfig, transcribe_audio

          source_url = os.environ['SOURCE_URL']
          media_url = os.environ['MEDIA_URL']
          work = Path(os.environ['WORK_DIR'])
          target = Path(os.environ['TARGET_DIR'])
          title = 'به وقت ایران؛ تفاوت راهبردی قصاص و انتقام'

          config = TranscriptionConfig(
              model='small',
              device='cpu',
              compute_type='int8',
              language='fa',
              beam_size=5,
              vad_filter=True,
              word_timestamps=True,
              condition_on_previous_text=False,
          )
          result = transcribe_audio(
              work / 'audio-16k-mono.wav',
              target / 'raw' / 'transcript.raw.json',
              target / 'raw' / 'transcript.raw.md',
              config,
          )
          cleaned = clean_transcript(
              target / 'raw' / 'transcript.raw.json',
              target / 'machine-final' / 'transcript.final.md',
              target / 'machine-final' / 'transcript.final.txt',
              title=title,
              source_url=source_url,
              max_words=80,
          )
          source = {
              'schema_version': 1,
              'source_url': source_url,
              'media_url': media_url,
              'program': 'به وقت ایران',
              'network': 'شبکه خبر',
              'guest': 'آیت‌الله سیدمحمدمهدی میرباقری',
              'date': '۱۴۰۵/۰۴/۱۶',
              'title': title,
              'duration_seconds': result.get('duration'),
          }
          outcome = {
              'schema_version': 1,
              'status': 'needs_editorial_review',
              'model': result.get('model'),
              'language': result.get('language'),
              'segments': len(result.get('segments', [])),
              'cleaned': cleaned,
          }
          (target / 'source.json').write_text(
              json.dumps(source, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          (target / 'result.json').write_text(
              json.dumps(outcome, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(outcome, ensure_ascii=False, indent=2))
          PY

      - name: Build compact review audio
        run: |
          ffmpeg -hide_banner -loglevel error -nostdin -y \
            -i "$WORK_DIR/audio-16k-mono.wav" \
            -ac 1 -ar 16000 -codec:a libmp3lame -b:a 32k \
            "$TARGET_DIR/review-audio.mp3"
          ffprobe -v error -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 \
            "$WORK_DIR/audio-16k-mono.wav" \
            > "$TARGET_DIR/reports/duration-seconds.txt"

      - name: Complete package and push output branch
        run: |
          cp -R run-reports/. "$TARGET_DIR/reports/"
          cat > "$TARGET_DIR/status.json" <<EOF
          {
            "status": "technical_processing_completed",
            "review_status": "needs_editorial_review",
            "source_url": "$SOURCE_URL",
            "media_url": "$MEDIA_URL",
            "workflow_run_id": "$GITHUB_RUN_ID",
            "completed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git add -f "$TARGET_DIR"
          git commit -m 'Store Telewebion 0x16c79674 technical output'
          git push --force origin "HEAD:$OUTPUT_BRANCH"

      - name: Persist failure diagnostics
        if: failure()
        run: |
          mkdir -p "$TARGET_DIR/reports"
          if [ -d run-reports ]; then
            cp -R run-reports/. "$TARGET_DIR/reports/" || true
          fi
          cat > "$TARGET_DIR/status.json" <<EOF
          {
            "status": "failed",
            "source_url": "$SOURCE_URL",
            "media_url": "$MEDIA_URL",
            "workflow_run_id": "$GITHUB_RUN_ID",
            "failed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git add -f "$TARGET_DIR"
          git commit -m 'Record Telewebion 0x16c79674 failure' || true
          git push --force origin "HEAD:$OUTPUT_BRANCH"

      - name: Upload transcript package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-transcript
          path: |
            processing/telewebion-0x16c79674/**
            run-reports/**
          retention-days: 30
          if-no-files-found: warn
