name: Process Telewebion 0x16c79674

on:
  push:
    branches:
      - agent/telewebion-0x16c79674
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telewebion-0x16c79674
  cancel-in-progress: false

jobs:
  transcribe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 340
    env:
      VIDEO_URL: https://telewebion.ir/episode/0x16c79674
      TARGET_BRANCH: agent/telewebion-0x16c79674
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/telewebion-0x16c79674
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install FFmpeg and pipeline
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install -e '.[all]'

      - name: Inspect source
        run: |
          mkdir -p run-logs
          vid-pipeline inspect "$VIDEO_URL" | tee run-logs/inspect.json

      - name: Run complete pipeline
        run: |
          set -o pipefail
          vid-pipeline run-url "$VIDEO_URL" \
            --name telewebion-0x16c79674 \
            --language fa \
            --model small \
            --device cpu \
            --compute-type int8 \
            2>&1 | tee run-logs/pipeline.log

      - name: Create compact review audio
        if: success()
        run: |
          audio_file=$(find outputs -path '*/audio/audio-16k-mono.wav' -print -quit)
          if [ -n "$audio_file" ]; then
            ffmpeg -hide_banner -loglevel error -y -i "$audio_file" \
              -codec:a libmp3lame -b:a 32k "${audio_file%/*}/review-audio.mp3"
          fi

      - name: Store technical outputs in repository
        if: success()
        run: |
          job_root=$(find outputs -mindepth 1 -maxdepth 1 -type d -name 'telewebion-0x16c79674-*' -print -quit)
          if [ -z "$job_root" ]; then
            echo 'Pipeline output directory was not found.' >&2
            exit 1
          fi

          target='processing/telewebion-0x16c79674'
          rm -rf "$target"
          mkdir -p "$target"
          cp "$job_root/source.json" "$target/"
          cp "$job_root/video-info.json" "$target/"
          cp "$job_root/state.json" "$target/"
          cp "$job_root/result.json" "$target/"
          cp -R "$job_root/raw" "$target/"
          cp -R "$job_root/final" "$target/machine-final"
          cp "$job_root/audio/review-audio.mp3" "$target/"
          cp -R run-logs "$target/"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$target"
          git commit -m 'Store Telewebion pipeline output [skip pipeline]'
          git push origin "HEAD:$TARGET_BRANCH"

      - name: Upload transcript package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-transcript
          path: |
            outputs/**/state.json
            outputs/**/source.json
            outputs/**/video-info.json
            outputs/**/result.json
            outputs/**/raw/**
            outputs/**/final/**
            outputs/**/audio/review-audio.mp3
            run-logs/**
          if-no-files-found: warn
          retention-days: 30
