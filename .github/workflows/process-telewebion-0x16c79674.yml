name: Process Telewebion 0x16c79674

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: process-telewebion-0x16c79674
  cancel-in-progress: true

jobs:
  process:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/telewebion-0x16c79674'
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      VIDEO_URL: https://telewebion.ir/episode/0x16c79674
      OUTPUT_BRANCH: agent/telewebion-0x16c79674-output
      TARGET_DIR: processing/telewebion-0x16c79674
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize observable output branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -C "$OUTPUT_BRANCH"
          mkdir -p "$TARGET_DIR/reports"
          cat > "$TARGET_DIR/status.json" <<EOF
          {
            "status": "running",
            "source_url": "$VIDEO_URL",
            "workflow_run_id": "$GITHUB_RUN_ID",
            "started_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git add "$TARGET_DIR/status.json"
          git commit -m 'Start Telewebion 0x16c79674 processing'
          git push --force origin "HEAD:$OUTPUT_BRANCH"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all]'

      - name: Inspect source
        run: |
          mkdir -p run-reports
          vid-pipeline inspect "$VIDEO_URL" | tee run-reports/inspect.json

      - name: Process video
        run: |
          set -o pipefail
          vid-pipeline run-url "$VIDEO_URL" \
            --name telewebion-0x16c79674 \
            --language fa \
            --model small \
            --device cpu \
            --compute-type int8 \
            --beam-size 5 \
            --max-paragraph-words 80 \
            2>&1 | tee run-reports/pipeline.log

      - name: Build review audio
        if: success()
        run: |
          wav=$(find outputs -path '*/audio/audio-16k-mono.wav' -print -quit)
          test -n "$wav"
          ffmpeg -hide_banner -loglevel error -y -i "$wav" \
            -ac 1 -ar 16000 -codec:a libmp3lame -b:a 48k \
            run-reports/review-audio.mp3
          ffprobe -v error -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 "$wav" \
            > run-reports/duration-seconds.txt

      - name: Prepare completed repository package
        if: success()
        run: |
          job_root=$(find outputs -mindepth 1 -maxdepth 1 -type d -name 'telewebion-0x16c79674-*' -print -quit)
          test -n "$job_root"

          rm -rf "$TARGET_DIR/raw" "$TARGET_DIR/machine-final"
          mkdir -p "$TARGET_DIR/raw" "$TARGET_DIR/machine-final" "$TARGET_DIR/reports"

          cp "$job_root/source.json" "$TARGET_DIR/source.json"
          cp "$job_root/video-info.json" "$TARGET_DIR/video-info.json"
          cp "$job_root/state.json" "$TARGET_DIR/state.json"
          cp "$job_root/result.json" "$TARGET_DIR/result.json"
          cp "$job_root/raw/transcript.raw.json" "$TARGET_DIR/raw/transcript.raw.json"
          cp "$job_root/raw/transcript.raw.md" "$TARGET_DIR/raw/transcript.raw.md"
          cp "$job_root/final/transcript.final.md" "$TARGET_DIR/machine-final/transcript.final.md"
          cp "$job_root/final/transcript.final.txt" "$TARGET_DIR/machine-final/transcript.final.txt"
          cp run-reports/inspect.json "$TARGET_DIR/reports/inspect.json"
          cp run-reports/pipeline.log "$TARGET_DIR/reports/pipeline.log"
          cp run-reports/duration-seconds.txt "$TARGET_DIR/reports/duration-seconds.txt"
          cp run-reports/review-audio.mp3 "$TARGET_DIR/review-audio.mp3"

          cat > "$TARGET_DIR/status.json" <<EOF
          {
            "status": "completed",
            "source_url": "$VIDEO_URL",
            "workflow_run_id": "$GITHUB_RUN_ID",
            "completed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Commit completed technical outputs
        if: success()
        run: |
          git add "$TARGET_DIR"
          git commit -m 'Store Telewebion 0x16c79674 technical output'
          git push --force origin "HEAD:$OUTPUT_BRANCH"

      - name: Persist failure diagnostics
        if: failure()
        run: |
          mkdir -p "$TARGET_DIR/reports"
          if [ -d run-reports ]; then
            cp -R run-reports/. "$TARGET_DIR/reports/" || true
          fi
          job_root=$(find outputs -mindepth 1 -maxdepth 1 -type d -name 'telewebion-0x16c79674-*' -print -quit || true)
          if [ -n "$job_root" ]; then
            cp "$job_root/state.json" "$TARGET_DIR/state.json" 2>/dev/null || true
            cp "$job_root/source.json" "$TARGET_DIR/source.json" 2>/dev/null || true
          fi
          cat > "$TARGET_DIR/status.json" <<EOF
          {
            "status": "failed",
            "source_url": "$VIDEO_URL",
            "workflow_run_id": "$GITHUB_RUN_ID",
            "failed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git add "$TARGET_DIR"
          git commit -m 'Record Telewebion 0x16c79674 failure' || true
          git push --force origin "HEAD:$OUTPUT_BRANCH"

      - name: Upload transcript package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-transcript
          path: |
            outputs/**/state.json
            outputs/**/source.json
            outputs/**/video-info.json
            outputs/**/result.json
            outputs/**/raw/**
            outputs/**/final/**
            run-reports/**
          retention-days: 30
          if-no-files-found: warn
