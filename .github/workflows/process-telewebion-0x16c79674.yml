name: Probe official Eitaa mirror

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Fetch public Eitaa channel variants
        shell: bash
        run: |
          mkdir -p run-reports/eitaa
          urls=(
            'https://eitaa.com/mirbaqeri_ir'
            'https://eitaa.com/mirbaqeri_ir/'
            'https://eitaa.com/s/mirbaqeri_ir'
            'https://eitaa.com/joinchat/1579108701C14a8d01c15'
          )
          index=0
          for url in "${urls[@]}"; do
            index=$((index + 1))
            printf '%s\n' "$url" > "run-reports/eitaa/${index}-url.txt"
            curl -L --compressed -sS --max-time 120 \
              -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36' \
              -D "run-reports/eitaa/${index}-headers.txt" \
              "$url" -o "run-reports/eitaa/${index}.html" || true
          done

      - name: Extract post and media clues
        shell: bash
        run: |
          python - <<'PY'
          import html
          import json
          import re
          from pathlib import Path

          terms = ('به وقت ایران', 'قصاص', 'انتقام', 'روایت فتح', 'میرباقری', '۱۶ تیر', '16 تیر')
          report = []
          for path in sorted(Path('run-reports/eitaa').glob('*.html')):
              text = html.unescape(path.read_text(encoding='utf-8', errors='replace'))
              urls = sorted(set(re.findall(r'https?://[^"\'<> ]+', text)))
              media = [u for u in urls if any(x in u.lower() for x in (
                  '.mp3', '.m4a', '.ogg', '.wav', '.mp4', 'download', 'file', 'media', 'cdn'
              ))]
              report.append({
                  'file': str(path),
                  'bytes': len(text.encode('utf-8')),
                  'matched_terms': [term for term in terms if term in text],
                  'media_urls': media,
                  'scripts': sorted(set(re.findall(r'<script[^>]+src=["\']([^"\']+)', text, flags=re.I))),
                  'forms': sorted(set(re.findall(r'<form[^>]+action=["\']([^"\']+)', text, flags=re.I))),
              })
          Path('run-reports/eitaa/results.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload Eitaa probes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-eitaa-probes
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
