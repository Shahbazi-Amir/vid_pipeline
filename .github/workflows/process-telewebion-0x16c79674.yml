name: Inspect Telegram downloader backend scripts

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Download scripts and pages
        shell: bash
        run: |
          mkdir -p run-reports/scripts
          curl -L --compressed -sS --max-time 120 \
            'https://www.tgvideodownloader.org/script.js?v=20260607d' \
            -o run-reports/scripts/tg-video-downloader.js
          curl -L --compressed -sS --max-time 120 \
            'https://telegramdownloader.net/script.js?v=1.9' \
            -o run-reports/scripts/telegram-downloader.js
          curl -L --compressed -sS --max-time 120 \
            'https://www.tgvideodownloader.org/' \
            -o run-reports/scripts/tg-video-downloader.html
          curl -L --compressed -sS --max-time 120 \
            'https://telegramdownloader.net/' \
            -o run-reports/scripts/telegram-downloader.html

      - name: Extract API logic
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          terms = (
              'fetch(', 'XMLHttpRequest', 'axios', '$.ajax', '/api/', 'api.',
              'download-btn', 'start-download', 'ts-download-btn', 'telegram-url',
              'ts-telegram-link', 'turnstile', 'cf-turnstile-response',
              'FormData', 'URLSearchParams', 'POST', 'method:', 'headers:',
              'response.json', 'response.text', 'downloadUrl', 'download_url',
              'fileUrl', 'file_url', 'mediaUrl', 'media_url', 'endpoint',
          )
          report = {}
          for path in sorted(Path('run-reports/scripts').glob('*')):
              text = path.read_text(encoding='utf-8', errors='replace')
              urls = sorted(set(re.findall(r'https?://[^"\'`<> )]+', text)))
              relative = sorted(set(re.findall(
                  r'["\'`](/(?:api|ajax|download|extract|resolve|process|fetch|telegram|media|file)[^"\'`\s]*)["\'`]',
                  text,
                  flags=re.I,
              )))
              contexts = {}
              for term in terms:
                  matches = list(re.finditer(re.escape(term), text, flags=re.I))
                  contexts[term] = [
                      text[max(0, match.start() - 1200):match.start() + 3500]
                      for match in matches[:50]
                  ]
              report[str(path)] = {
                  'bytes': len(text.encode('utf-8')),
                  'urls': urls,
                  'relative_endpoints': relative,
                  'contexts': contexts,
              }
          Path('run-reports/scripts/report.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          for path, data in report.items():
              print('\n###', path)
              print('relative:', data['relative_endpoints'])
              for url in data['urls']:
                  if any(token in url.lower() for token in ('api', 'download', 'extract', 'resolve', 'worker', 'cloudflare')):
                      print(url)
          PY

      - name: Upload script analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-downloader-scripts
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
