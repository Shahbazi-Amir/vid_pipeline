name: Probe Telegram unauthenticated media API

on:
  push:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  pull_request:
    paths:
      - .github/workflows/process-telewebion-0x16c79674.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Fetch post and probe API methods
        shell: bash
        run: |
          mkdir -p run-reports/api
          curl -L --compressed -sS -c run-reports/api/cookies.txt \
            'https://t.me/ostad_mirbaqeri/2102?embed=1&mode=tme' \
            -o run-reports/api/post.html
          python - <<'PY' > run-reports/api/config.env
          import html
          import re
          from pathlib import Path

          text = html.unescape(Path('run-reports/api/post.html').read_text(encoding='utf-8'))
          values = {
              'API_URL': re.search(r'"api_url":"([^"]+)', text).group(1).replace('\\/', '/'),
              'UPLOAD_URL': re.search(r'"upload_url":"([^"]+)', text).group(1).replace('\\/', '/'),
              'PEER': re.search(r'data-peer="([^"]+)', text).group(1),
              'PEER_HASH': re.search(r'data-peer-hash="([^"]+)', text).group(1),
              'POST_ID': re.search(r'data-post-id="([^"]+)', text).group(1),
          }
          for key, value in values.items():
              print(f"{key}='{value}'")
          PY
          source run-reports/api/config.env
          methods=(
            getMessage getMessages getPost getHistory getDocument getMedia getFile downloadFile
            messages.getMessages channels.getMessages upload.getFile sendVote
          )
          index=0
          for method in "${methods[@]}"; do
            index=$((index + 1))
            safe=$(printf '%s' "$method" | tr '.:' '__')
            curl -L --compressed -sS \
              -b run-reports/api/cookies.txt -c run-reports/api/cookies.txt \
              -H 'X-Requested-With: XMLHttpRequest' \
              -H 'Content-Type: application/x-www-form-urlencoded; charset=UTF-8' \
              --data-urlencode "method=$method" \
              --data-urlencode "peer=$PEER" \
              --data-urlencode "peer_hash=$PEER_HASH" \
              --data-urlencode "post_id=$POST_ID" \
              --data-urlencode "id=$POST_ID" \
              --data-urlencode "message_id=$POST_ID" \
              --data-urlencode 'options=' \
              -D "run-reports/api/${index}-${safe}-headers.txt" \
              "$API_URL" -o "run-reports/api/${index}-${safe}.json" || true
          done
          curl -L --compressed -sS \
            -b run-reports/api/cookies.txt -c run-reports/api/cookies.txt \
            -H 'X-Requested-With: XMLHttpRequest' \
            -F "method=getFile" \
            -F "peer=$PEER" \
            -F "peer_hash=$PEER_HASH" \
            -F "post_id=$POST_ID" \
            "$UPLOAD_URL" -o run-reports/api/upload-getFile.json || true

      - name: Upload API probes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-api-probes
          path: run-reports/**
          retention-days: 30
          if-no-files-found: error
