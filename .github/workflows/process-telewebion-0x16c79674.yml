name: Process Telewebion 0x16c79674

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: telewebion-0x16c79674
  cancel-in-progress: false

jobs:
  transcribe:
    if: github.event.pull_request.head.ref == 'agent/telewebion-0x16c79674'
    runs-on: ubuntu-latest
    timeout-minutes: 340
    env:
      VIDEO_URL: https://telewebion.ir/episode/0x16c79674
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install FFmpeg and pipeline
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install -e '.[all]'

      - name: Inspect source
        run: |
          mkdir -p run-logs
          vid-pipeline inspect "$VIDEO_URL" | tee run-logs/inspect.json

      - name: Run complete pipeline
        run: |
          set -o pipefail
          vid-pipeline run-url "$VIDEO_URL" \
            --name telewebion-0x16c79674 \
            --language fa \
            --model small \
            --device cpu \
            --compute-type int8 \
            2>&1 | tee run-logs/pipeline.log

      - name: Create compact review audio
        if: success()
        run: |
          audio_file=$(find outputs -path '*/audio/audio-16k-mono.wav' -print -quit)
          if [ -n "$audio_file" ]; then
            ffmpeg -hide_banner -loglevel error -y -i "$audio_file" \
              -codec:a libmp3lame -b:a 32k "${audio_file%/*}/review-audio.mp3"
          fi

      - name: Upload transcript package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telewebion-0x16c79674-transcript
          path: |
            outputs/**/state.json
            outputs/**/source.json
            outputs/**/video-info.json
            outputs/**/result.json
            outputs/**/raw/**
            outputs/**/final/**
            outputs/**/audio/review-audio.mp3
            run-logs/**
          if-no-files-found: warn
          retention-days: 30
