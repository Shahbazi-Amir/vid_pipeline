name: Ruff Report

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - name: Write Ruff report
        shell: bash
        run: |
          mkdir -p diagnostics
          set +e
          ruff check src tests --output-format=json > diagnostics/ruff.json
          echo $? > diagnostics/exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: diagnostics/
          retention-days: 1
