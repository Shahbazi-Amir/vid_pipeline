name: Catalog Asre Shirin Season 2

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: catalog-asre-shirin-season-2-v2
  cancel-in-progress: true

jobs:
  catalog:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/run-season2-catalog'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Report PR start
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Catalog workflow started — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bound external crawl
        run: |
          sed -i 's/timeout: int = 45/timeout: int = 12/' scripts/catalog_asre_shirin.py
          sed -i 's/max_pages: int = 150/max_pages: int = 40/' scripts/catalog_asre_shirin.py
          sed -i 's/max_pages: int = 45/max_pages: int = 20/' scripts/catalog_asre_shirin.py

      - name: Build catalog from official sources
        id: catalog
        shell: bash
        run: |
          set +e
          timeout 12m env PYTHONPATH=src python scripts/catalog_asre_shirin.py \
            --output data/asre-shirin-season-2-catalog.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ ! -f data/asre-shirin-season-2-catalog.json ]; then
            printf '{"status":"crawl_timeout","season_two":[],"season_two_matches":0}\n' \
              > data/asre-shirin-season-2-catalog.json
          fi
          exit 0

      - name: Upload catalog diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asre-shirin-season-2-catalog
          path: data/asre-shirin-season-2-catalog.json
          retention-days: 7

      - name: Commit catalog result
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/asre-shirin-season-2-catalog.json
          if git diff --cached --quiet; then
            echo "Catalog is unchanged"
          else
            git commit -m "Catalog Asre Shirin season 2"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Report PR result
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          summary=$(python - <<'PY'
          import json
          data = json.load(open("data/asre-shirin-season-2-catalog.json", encoding="utf-8"))
          print(
              f"status={data.get('status')}, "
              f"season1={data.get('season_one_matches')}, "
              f"season2={data.get('season_two_matches')}, "
              f"blog={data.get('blog_detail_urls')}, "
              f"telegram={data.get('telegram_official_urls')}"
          )
          PY
          )
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Catalog workflow finished — $summary — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Enforce catalog result
        if: steps.catalog.outputs.exit_code != '0'
        run: |
          echo "Catalog is partial or needs investigation; diagnostics were persisted."
          exit 1
